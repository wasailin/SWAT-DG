name: Publish to PyPI

# Builds the sdist + wheel and publishes to PyPI.
#
# Trigger: pushing a git tag that starts with "v" (e.g. v0.6.0, v0.6.1).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token secrets required.
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   - PyPI project name: swat-dg
#   - Owner: wasailin
#   - Repository name: SWAT-DG
#   - Workflow filename: publish.yml
#   - Environment name: pypi
#
# To release:
#   1. Bump `version` in pyproject.toml
#   2. git tag vX.Y.Z && git push --tags   (on the public repo)
#   3. This workflow builds the artifacts and uploads them to PyPI.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish when pushing a version tag (skip on workflow_dispatch unless you opt in).
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/swat-dg

    permissions:
      id-token: write  # Required for PyPI Trusted Publishing (OIDC)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
